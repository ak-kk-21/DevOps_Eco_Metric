sonar.projectKey=your-github-username_eco-metric-api
sonar.organization=your-sonarcloud-org

sonar.projectName=Eco-Metric API
sonar.projectVersion=1.0.0

# Source and test paths
sonar.sources=app
sonar.tests=tests

# Coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions — don't analyse data files or __init__ stubs
sonar.exclusions=app/data/**,**/__init__.py

# Quality gate: block PRs that drop coverage below 80%
# This is enforced via SonarCloud's "Sonar Way" quality gate (set in the UI)
